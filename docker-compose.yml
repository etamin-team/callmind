version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: callmind-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: callmind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: callmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callmind"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Admin UI for PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: callmind-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@callmind.com
      PGADMIN_DEFAULT_PASSWORD: password
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
